version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    # pydantic pins pydantic-core exactly; update both through the direct
    # pydantic dependency instead of letting Dependabot break the compiled lock.
    ignore:
      - dependency-name: pydantic-core
    groups:
      python-dependencies:
        patterns: ["*"]
